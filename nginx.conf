server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Backend API proxy
  location /api/v1/ {
    proxy_pass http://host.docker.internal:5002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Backend health check proxy
  location /health {
    proxy_pass http://host.docker.internal:5002;
    proxy_set_header Host $host;
  }

  # ISL model API proxy (strips /model-api prefix)
  location /model-api/ {
    proxy_pass http://host.docker.internal:8003/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # ASL model API proxy (strips /asl-api prefix)
  location /asl-api/ {
    proxy_pass http://host.docker.internal:8005/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
